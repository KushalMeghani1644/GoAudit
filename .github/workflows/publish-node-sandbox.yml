name: Publish Node sandbox image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/kushalmeghani1644/goaudit-node-sandbox
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.node-sandbox
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Validate sandbox prerequisites
        env:
          SANDBOX_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          while IFS= read -r image; do
            [ -n "$image" ] || continue
            docker pull "$image"
            docker run --rm "$image" sh -lc '
              set -eu
              for bin in bash node npm pnpm bun strace curl rsync dig; do
                command -v "$bin" >/dev/null 2>&1 || { echo "missing $bin"; exit 1; }
              done
              test -f /etc/ssl/certs/ca-certificates.crt || { echo "missing ca-certificates"; exit 1; }
            '
          done <<EOF
          $SANDBOX_TAGS
          EOF
